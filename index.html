<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月球軌道ディフェンス</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: white;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        canvas {
            display: block;
        }
        .ui-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 40vh;
            overflow-y: auto;
        }
        input[type=range] {
            cursor: pointer;
            accent-color: #3b82f6;
        }
        .settings-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 2px 4px;
            width: 50px;
            font-size: 10px;
            border-radius: 4px;
        }
        .menu-screen {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div id="game-container" class="relative w-full h-screen flex flex-col">
        <!-- 分数显示 -->
        <div class="absolute top-4 left-4 z-50 flex flex-col gap-2">
            <div class="bg-black/40 backdrop-blur-md px-4 py-2 rounded-lg border border-white/10">
                <span class="text-sm text-gray-400">SCORE:</span>
                <span id="score-val" class="text-xl font-black text-blue-400 ml-2">0</span>
            </div>
            <div id="lvl-up-indicator" class="text-[10px] text-yellow-400 font-bold opacity-0 transition-opacity">難易度上昇! SPEED UP</div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" class="flex-grow"></canvas>

        <!-- 右上角控制 -->
        <div class="absolute top-4 right-4 z-50 flex gap-2">
            <button id="pause-btn" class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 px-4 py-2 rounded-lg font-bold transition">
                一時停止 (Esc)
            </button>
        </div>

        <!-- UI 控制面板 -->
        <div class="ui-panel p-4 w-full">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div id="controls-container" class="contents"></div>
                
                <div class="flex flex-col gap-2 p-3 bg-white/5 rounded-lg">
                    <label class="text-sm font-medium flex justify-between">
                        <span>敵の出現頻度 (ベース)</span>
                    </label>
                    <input type="number" id="input-spawn-rate" value="100" class="bg-black/40 border border-white/20 rounded px-2 py-1 text-sm outline-none focus:border-blue-500">
                </div>
            </div>
        </div>

        <!-- 开始菜单 -->
        <div id="start-menu" class="absolute inset-0 z-[100] menu-screen flex flex-col items-center justify-center text-center p-6">
            <h1 class="text-5xl font-black mb-4 tracking-tighter text-blue-500 italic">月球軌道ディフェンス</h1>
            <p class="text-gray-400 mb-8 max-w-md">地球の軌道を維持し、迫りくる隕石を月で迎撃せよ。</p>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 mb-8 text-sm space-y-2">
                <p><span class="text-blue-400 font-bold">スペースキー / クリック:</span> 推進力 (月を外側へ)</p>
                <p><span class="text-blue-400 font-bold">自動:</span> 重力 (月を内側へ)</p>
                <p><span class="text-green-400 font-bold">Melt (緑):</span> 画面上の全敵を即座に溶解</p>
            </div>
            <button id="start-btn" class="px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-black text-xl transition-all transform hover:scale-105">
                スペースキーを押して開始
            </button>
        </div>

        <!-- 暂停菜单 -->
        <div id="pause-menu" class="hidden absolute inset-0 z-[90] menu-screen flex flex-col items-center justify-center">
            <h2 class="text-4xl font-bold mb-8">ポーズ中</h2>
            <div class="bg-white/10 p-8 rounded-3xl w-80 flex flex-col gap-6 border border-white/10">
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-400">マスター音量</label>
                    <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.5" class="w-full">
                </div>
                <button id="resume-btn" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold transition">ゲームに戻る</button>
            </div>
        </div>

        <!-- 死亡画面 -->
        <div id="death-screen" class="hidden absolute inset-0 bg-black/95 flex flex-col items-center justify-center z-[110]">
            <h1 class="text-7xl font-black text-red-600 mb-4 italic">文明崩壊</h1>
            <p id="final-score" class="text-2xl text-blue-400 mb-12 font-bold tracking-widest">最終スコア: 0</p>
            <button onclick="location.reload()" class="px-10 py-4 bg-white text-black hover:bg-gray-200 rounded-full font-black transition">再起動</button>
        </div>

        <!-- HP 显示 -->
        <div id="status-overlay" class="absolute top-12 left-1/2 -translate-x-1/2 pointer-events-none text-center z-40">
            <div id="hp-display" class="text-2xl font-bold mb-2 text-white/90">地球のHP: <span class="text-red-500">3</span></div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startMenu = document.getElementById('start-menu');
    const pauseMenu = document.getElementById('pause-menu');
    const deathScreen = document.getElementById('death-screen');
    const hpDisplay = document.querySelector('#hp-display span');
    const scoreDisplay = document.getElementById('score-val');
    const finalScoreDisplay = document.getElementById('final-score');
    const spawnRateInput = document.getElementById('input-spawn-rate');
    const volumeSlider = document.getElementById('volume-control');
    const lvlUpIndicator = document.getElementById('lvl-up-indicator');

    // --- 音频系统 ---
    const AudioEngine = {
        ctx: null,
        masterGain: null,
        isPlaying: false,
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain();
            this.masterGain.connect(this.ctx.destination);
            this.masterGain.gain.value = parseFloat(localStorage.getItem('game_volume') || 0.5);
            volumeSlider.value = this.masterGain.gain.value;
        },
        playBGM() {
            if (this.isPlaying) return;
            this.init();
            this.isPlaying = true;
            const playNote = (freq, time, duration) => {
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, time);
                g.gain.setValueAtTime(0, time);
                g.gain.linearRampToValueAtTime(0.08, time + 0.05);
                g.gain.linearRampToValueAtTime(0, time + duration);
                osc.connect(g);
                g.connect(this.masterGain);
                osc.start(time);
                osc.stop(time + duration);
            };
            const sequence = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];
            let nextTime = this.ctx.currentTime;
            const scheduler = () => {
                if (!this.isPlaying) return;
                while (nextTime < this.ctx.currentTime + 0.1) {
                    const freq = sequence[Math.floor((nextTime * 2) % sequence.length)];
                    playNote(freq, nextTime, 0.4);
                    nextTime += 0.5;
                }
                setTimeout(scheduler, 50);
            };
            scheduler();
        },
        stopBGM() { this.isPlaying = false; },
        playSFX(type) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.connect(g);
            g.connect(this.masterGain);
            const now = this.ctx.currentTime;
            if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.1);
            } else if (type === 'hit_e2') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.linearRampToValueAtTime(120, now + 0.05);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.05);
            } else if (type === 'split') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                g.gain.setValueAtTime(0.1, now);
                g.gain.linearRampToValueAtTime(0, now + 0.1);
            } else if (type === 'damage') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(20, now + 0.3);
                g.gain.setValueAtTime(0.3, now);
                g.gain.linearRampToValueAtTime(0, now + 0.3);
            } else if (type === 'thrust') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(60, now);
                g.gain.setValueAtTime(0.04, now);
                g.gain.linearRampToValueAtTime(0, now + 0.05);
            } else if (type === 'powerup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                g.gain.setValueAtTime(0.2, now);
                g.gain.linearRampToValueAtTime(0, now + 0.3);
            }
            osc.start();
            osc.stop(now + 0.4);
        }
    };

    // --- 资源加载 ---
    const assets = {
        earth: new Image(), moon: new Image(),
        e1: new Image(), e2: new Image(), e3: new Image(),
        melt: new Image()
    };
    assets.earth.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Earth.png';
    assets.moon.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Moon.png';
    assets.e1.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Enemy_Purple_1.png';
    assets.e2.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Enemy_Red_1.png'; 
    assets.e3.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Enemy_Red_2.png';
    assets.melt.src = 'https://raw.githubusercontent.com/Holtashen/AI_GameJam/main/Melt.png';

    // --- 配置 ---
    const savedConfig = JSON.parse(localStorage.getItem('game_config') || '{}');
    let config = {
        angularSpeed: { val: 0.08, min: 0.01, max: 0.2, label: '月の角速度' },
        gravity: { val: 3.0, min: 0.1, max: 10.0, label: '地球の重力' },
        liftForce: { val: 8.25, min: 1.0, max: 20.0, label: '推進力の強さ' },
        enemySpeed: { val: 2.0, min: 0.1, max: 10.0, label: '敵の基本速度' } 
    };
    Object.keys(savedConfig).forEach(k => { if(config[k]) config[k] = savedConfig[k]; });
    spawnRateInput.value = localStorage.getItem('game_spawn_rate') || 100;

    // --- 游戏状态 ---
    let earth = { x: 0, y: 0, hp: 3, radius: 80 };
    let moon = { angle: 0, distance: 300, radius: 60 };
    let enemies = [];
    let comets = []; 
    let particles = [];
    let score = 0;
    let difficultyMultiplier = 1.0;
    let isPressing = false;
    let isGameOver = false;
    let isPaused = false;
    let isStarted = false;
    let frameCount = 0;
    let globalEffectTimer = 0;
    let currentGlobalEffect = null; // 'melt'

    function saveSettings() {
        localStorage.setItem('game_config', JSON.stringify(config));
        localStorage.setItem('game_spawn_rate', spawnRateInput.value);
        if (AudioEngine.masterGain) localStorage.setItem('game_volume', AudioEngine.masterGain.gain.value);
    }

    function createSliderUI() {
        const container = document.getElementById('controls-container');
        container.innerHTML = '';
        Object.keys(config).forEach(key => {
            const item = config[key];
            const div = document.createElement('div');
            div.className = 'flex flex-col gap-2 p-3 bg-white/5 rounded-lg';
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-300">${item.label}</span>
                    <button onclick="toggleSettings('${key}')" class="text-[10px] opacity-50 hover:opacity-100 bg-white/10 px-1 rounded">設定</button>
                </div>
                <div id="settings-${key}" class="hidden flex gap-2 items-center mb-1">
                    <span class="text-[10px]">最小:</span>
                    <input type="number" class="settings-input" value="${item.min}" onchange="updateBound('${key}', 'min', this.value)">
                    <span class="text-[10px]">最大:</span>
                    <input type="number" class="settings-input" value="${item.max}" onchange="updateBound('${key}', 'max', this.value)">
                </div>
                <div class="flex items-center gap-3">
                    <input type="range" id="range-${key}" min="${item.min}" max="${item.max}" step="0.01" value="${item.val}" class="flex-grow">
                    <span id="display-${key}" class="text-xs font-mono w-10 text-right">${item.val.toFixed(2)}</span>
                </div>
            `;
            container.appendChild(div);
            div.querySelector(`#range-${key}`).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                config[key].val = val;
                document.getElementById(`display-${key}`).textContent = val.toFixed(2);
                saveSettings();
            });
        });
    }

    window.toggleSettings = (key) => document.getElementById(`settings-${key}`).classList.toggle('hidden');
    window.updateBound = (key, type, val) => {
        const num = parseFloat(val);
        config[key][type] = num;
        document.getElementById(`range-${key}`)[type] = num;
        saveSettings();
    };

    spawnRateInput.onchange = saveSettings;
    volumeSlider.oninput = (e) => {
        if (AudioEngine.masterGain) AudioEngine.masterGain.gain.value = e.target.value;
        saveSettings();
    };

    function togglePause() {
        if (!isStarted || isGameOver) return;
        isPaused = !isPaused;
        if (isPaused) pauseMenu.classList.remove('hidden');
        else { pauseMenu.classList.add('hidden'); AudioEngine.playBGM(); }
    }
    document.getElementById('pause-btn').onclick = togglePause;
    document.getElementById('resume-btn').onclick = togglePause;

    function resize() {
        const panelHeight = document.querySelector('.ui-panel').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - panelHeight;
        earth.x = canvas.width / 2;
        earth.y = canvas.height / 2;
    }
    window.addEventListener('resize', resize);

    function startGame() {
        if (isStarted) return;
        isStarted = true;
        startMenu.classList.add('hidden');
        AudioEngine.init(); AudioEngine.playBGM();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space') { if (!isStarted) startGame(); else if (!isPaused) { isPressing = true; AudioEngine.playSFX('thrust'); } e.preventDefault(); }
        if(e.code === 'Escape') togglePause();
    });
    window.addEventListener('keyup', (e) => { if(e.code === 'Space') isPressing = false; });
    canvas.addEventListener('mousedown', () => { if(!isStarted) startGame(); else isPressing = true; });
    canvas.addEventListener('mouseup', () => isPressing = false);

    // 仅生成 Melt 彗星
    function spawnComet() {
        if (isPaused) return;
        const type = 'Melt';
        const startEdge = Math.floor(Math.random() * 4);
        let x, y, targetX, targetY;
        if (startEdge === 0) { x = Math.random() * canvas.width; y = -150; targetX = Math.random() * canvas.width; targetY = canvas.height + 150; }
        else if (startEdge === 1) { x = canvas.width + 150; y = Math.random() * canvas.height; targetX = -150; targetY = Math.random() * canvas.height; }
        else if (startEdge === 2) { x = Math.random() * canvas.width; y = canvas.height + 150; targetX = Math.random() * canvas.width; targetY = -150; }
        else { x = -150; y = Math.random() * canvas.height; targetX = canvas.width + 150; targetY = Math.random() * canvas.height; }
        const dx = targetX - x, dy = targetY - y, dist = Math.sqrt(dx * dx + dy * dy);
        const speed = 4 + Math.random() * 3;
        comets.push({ type, x, y, vx: (dx / dist) * speed, vy: (dy / dist) * speed, radius: 50, angle: Math.atan2(dy, dx) + Math.PI/2, img: assets.melt, history: [] });
    }

    function spawnEnemy() {
        if (isPaused) return;
        // 彗星生成概率提升至 20%
        if (Math.random() < 0.20) spawnComet();
        const edge = Math.floor(Math.random() * 4);
        let x, y, padding = 100;
        if (edge === 0) { x = Math.random() * canvas.width; y = -padding; }
        else if (edge === 1) { x = canvas.width + padding; y = Math.random() * canvas.height; }
        else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + padding; }
        else { x = -padding; y = Math.random() * canvas.height; }
        const dx = earth.x - x, dy = earth.y - y, dist = Math.sqrt(dx * dx + dy * dy);
        const typeRoll = Math.random();
        const type = typeRoll > 0.7 ? 'E2' : 'E1';
        const randomVariation = 0.6 + Math.random() * 0.8; 
        const speed = config.enemySpeed.val * difficultyMultiplier * randomVariation;
        enemies.push({ type, x, y, vx: (dx / dist) * speed, vy: (dy / dist) * speed, radius: type === 'E2' ? 44 : 36, currentRadius: type === 'E2' ? 44 : 36, angle: Math.atan2(dy, dx) + Math.PI/2, img: type === 'E2' ? assets.e2 : assets.e1, hp: type === 'E2' ? 2 : 1, isTouchingMoon: false });
    }

    function spawnE3(x, y, originalVx, originalVy) {
        AudioEngine.playSFX('split');
        const backwardAngle = Math.atan2(originalVy, originalVx) + Math.PI;
        for(let i = 0; i < 2; i++) {
            const spread = (i === 0 ? -0.5 : 0.5);
            const angle = backwardAngle + spread;
            const speed = config.enemySpeed.val * 1.2 * difficultyMultiplier;
            enemies.push({ type: 'E3', x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 32, currentRadius: 32, angle: Math.atan2(Math.sin(angle), Math.cos(angle)) + Math.PI/2, img: assets.e3, hp: 1, isTouchingMoon: false });
        }
    }

    function addScore(pts = 1) {
        score += pts;
        scoreDisplay.textContent = score;
        if (score > 0 && score % 10 === 0) {
            difficultyMultiplier += 0.1;
            lvlUpIndicator.style.opacity = '1';
            setTimeout(() => lvlUpIndicator.style.opacity = '0', 2000);
            AudioEngine.playSFX('split'); 
        }
    }

    function createExplosion(x, y, color = '#60a5fa', count = 20) {
        for (let i = 0; i < count; i++) {
            particles.push({ x, y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 1.0, color });
        }
    }

    function triggerMelt() {
        currentGlobalEffect = 'melt';
        globalEffectTimer = 60; 
        const count = enemies.length;
        enemies.forEach(e => createExplosion(e.x, e.y, '#a3e635', 15));
        enemies = [];
        addScore(count);
        AudioEngine.playSFX('powerup');
    }

    function gameLoop() {
        if (!isStarted || isGameOver) return;
        if (!isPaused) {
            frameCount++;
            const baseSpawnRate = parseInt(spawnRateInput.value) || 100;
            const dynamicSpawnRate = Math.max(10, Math.floor(baseSpawnRate / difficultyMultiplier));
            if (frameCount % dynamicSpawnRate === 0) spawnEnemy();
            moon.angle += config.angularSpeed.val;
            moon.distance -= config.gravity.val;
            if (isPressing) {
                moon.distance += config.liftForce.val;
                if (frameCount % 5 === 0) AudioEngine.playSFX('thrust');
            }
            const maxAllowedOrbit = Math.min(canvas.width, canvas.height) / 2 - moon.radius;
            if (moon.distance > maxAllowedOrbit) moon.distance = maxAllowedOrbit;
            const mx = earth.x + Math.cos(moon.angle) * moon.distance;
            const my = earth.y + Math.sin(moon.angle) * moon.distance;

            // 地球碰撞
            if (moon.distance < (earth.radius + moon.radius - 15)) {
                earth.hp -= 1; AudioEngine.playSFX('damage');
                hpDisplay.textContent = earth.hp;
                createExplosion(mx, my, '#ffeb3b');
                moon.distance = earth.radius + moon.radius + 120;
                if (earth.hp <= 0) isGameOver = true;
            }

            // 彗星逻辑
            for (let i = comets.length - 1; i >= 0; i--) {
                const c = comets[i];
                c.history.push({x: c.x, y: c.y});
                if (c.history.length > 10) c.history.shift();
                c.x += c.vx; c.y += c.vy;
                const dx = c.x - mx, dy = c.y - my, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < c.radius + moon.radius - 10) {
                    triggerMelt();
                    comets.splice(i, 1); continue;
                }
                if (c.x < -300 || c.x > canvas.width + 300 || c.y < -300 || c.y > canvas.height + 300) comets.splice(i, 1);
            }

            if (globalEffectTimer > 0) {
                globalEffectTimer--;
                if (globalEffectTimer <= 0) {
                    currentGlobalEffect = null;
                }
            }

            // 敌人逻辑
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx; e.y += e.vy;
                
                e.currentRadius += (e.radius - e.currentRadius) * 0.1;
                const dx = e.x - earth.x, dy = e.y - earth.y, distToEarth = Math.sqrt(dx*dx + dy*dy);
                const dmx = e.x - mx, dmy = e.y - my, distToMoon = Math.sqrt(dmx*dmx + dmy*dmy);

                if (distToMoon < moon.radius + e.currentRadius - 5) {
                    if (!e.isTouchingMoon) {
                        e.hp -= 1; e.isTouchingMoon = true;
                        if (e.hp > 0) {
                            AudioEngine.playSFX('hit_e2'); e.currentRadius = e.radius * 0.35; 
                            createExplosion(e.x, e.y, '#ef4444', 12);
                            const recoil = 8; e.x -= (dmx / distToMoon) * recoil; e.y -= (dmy / distToMoon) * recoil;
                        } else {
                            AudioEngine.playSFX('hit'); createExplosion(e.x, e.y, e.type === 'E1' ? '#a855f7' : '#ef4444');
                            addScore(1); if(e.type === 'E2') spawnE3(e.x, e.y, e.vx, e.vy);
                            enemies.splice(i, 1); continue;
                        }
                    }
                } else e.isTouchingMoon = false;

                if (distToEarth < earth.radius + e.currentRadius - 10) {
                    earth.hp -= 1; AudioEngine.playSFX('damage');
                    hpDisplay.textContent = earth.hp; createExplosion(e.x, e.y, '#ffffff');
                    enemies.splice(i, 1); if (earth.hp <= 0) isGameOver = true;
                    continue;
                }
                if (e.x < -1000 || e.x > canvas.width + 1000 || e.y < -1000 || e.y > canvas.height + 1000) enemies.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // --- 渲染 ---
        const mx = earth.x + Math.cos(moon.angle) * moon.distance;
        const my = earth.y + Math.sin(moon.angle) * moon.distance;
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const orbitPulse = (Math.sin(Date.now() / 300) + 1) / 2;
        ctx.strokeStyle = `rgba(59, 130, 246, ${0.1 + orbitPulse * 0.15})`;
        ctx.lineWidth = 2 + orbitPulse * 2;
        ctx.beginPath(); ctx.arc(earth.x, earth.y, moon.distance, 0, Math.PI*2); ctx.stroke();

        if (currentGlobalEffect === 'melt') {
            ctx.fillStyle = `rgba(163, 230, 53, ${Math.min(0.3, globalEffectTimer/50)})`;
            ctx.fillRect(0,0,canvas.width, canvas.height);
        }

        if (assets.earth.complete) ctx.drawImage(assets.earth, earth.x - earth.radius, earth.y - earth.radius, earth.radius*2, earth.radius*2);

        comets.forEach(c => {
            c.history.forEach((pos, idx) => {
                const ratio = idx / c.history.length;
                ctx.globalAlpha = ratio * 0.4;
                ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(c.angle);
                const s = c.radius * (0.5 + ratio * 0.5); ctx.drawImage(c.img, -s, -s, s*2, s*2);
                ctx.restore();
            });
            ctx.globalAlpha = 1; ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle);
            ctx.drawImage(c.img, -c.radius, -c.radius, c.radius*2, c.radius*2); ctx.restore();
        });

        enemies.forEach(e => {
            ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle);
            if (e.img.complete) ctx.drawImage(e.img, -e.currentRadius, -e.currentRadius, e.currentRadius*2, e.currentRadius*2);
            if (e.type === 'E2' && e.hp === 2) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.setLineDash([6, 4]);
                ctx.beginPath(); ctx.arc(0, 0, e.currentRadius + 8, 0, Math.PI * 2); ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.restore();
        });

        ctx.save(); ctx.translate(mx, my); ctx.rotate(moon.angle + Math.PI/2);
        if (assets.moon.complete) ctx.drawImage(assets.moon, -moon.radius, -moon.radius, moon.radius*2, moon.radius*2);
        ctx.restore();

        particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        if (isGameOver) {
            finalScoreDisplay.textContent = `最終スコア: ${score}`;
            deathScreen.classList.remove('hidden'); AudioEngine.stopBGM();
            return;
        }
        requestAnimationFrame(gameLoop);
    }
    window.onload = () => { resize(); createSliderUI(); };
</script>
</body>
